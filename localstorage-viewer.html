<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalStorage Viewer - CampusPulse</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', monospace;
            background: #0a0a0a;
            color: #e2e8f0;
            padding: 30px;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.4rem;
            color: #10b981;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 28px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }
        .box {
            background: #111827;
            border: 1px solid rgba(16,185,129,0.25);
            border-radius: 12px;
            overflow: hidden;
        }
        .box-header {
            background: rgba(16,185,129,0.1);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(16,185,129,0.2);
        }
        .box-header h3 {
            font-size: 0.85rem;
            color: #10b981;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .count-badge {
            background: #10b981;
            color: #000;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .box-body {
            padding: 14px 16px;
            max-height: 320px;
            overflow-y: auto;
            font-size: 0.78rem;
            line-height: 1.7;
        }
        .box-body::-webkit-scrollbar { width: 4px; }
        .box-body::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }

        .entry {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
        }
        .entry:last-child { margin-bottom: 0; }
        .entry .field { display: flex; gap: 8px; margin-bottom: 2px; }
        .entry .key { color: #10b981; min-width: 90px; flex-shrink: 0; }
        .entry .val { color: rgba(255,255,255,0.75); word-break: break-all; }

        .sentiment-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .positive { background: rgba(76,175,80,0.2); color: #4caf50; }
        .neutral  { background: rgba(255,152,0,0.2);  color: #ff9800; }
        .negative { background: rgba(244,67,54,0.2);  color: #f44336; }

        .empty { color: rgba(255,255,255,0.25); font-style: italic; font-size: 0.8rem; }

        .bottom-bar {
            background: #111827;
            border: 1px solid rgba(16,185,129,0.25);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .bottom-bar .info { font-size: 0.8rem; color: rgba(255,255,255,0.4); }
        .bottom-bar .info span { color: #10b981; font-weight: 700; }

        .btn-row { display: flex; gap: 10px; }
        button {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-refresh { background: #10b981; color: #000; }
        .btn-clear   { background: rgba(244,67,54,0.15); color: #f44336; border: 1px solid rgba(244,67,54,0.3); }
        .btn-back    { background: rgba(255,255,255,0.07); color: #fff; }

        .live-dot {
            width: 8px; height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<h1>🗄️ CampusPulse — LocalStorage Viewer</h1>
<p class="subtitle"><span class="live-dot"></span>Live view of all data stored in your browser's localStorage</p>

<div class="grid">
    <!-- Students -->
    <div class="box">
        <div class="box-header">
            <h3>👤 Students</h3>
            <span class="count-badge" id="studentCount">0</span>
        </div>
        <div class="box-body" id="studentsBox">
            <p class="empty">No students registered yet.</p>
        </div>
    </div>

    <!-- Current User -->
    <div class="box">
        <div class="box-header">
            <h3>🔐 Current Session</h3>
            <span class="count-badge" id="sessionCount">0</span>
        </div>
        <div class="box-body" id="sessionBox">
            <p class="empty">No active session.</p>
        </div>
    </div>

    <!-- Feedbacks -->
    <div class="box">
        <div class="box-header">
            <h3>💬 Feedbacks</h3>
            <span class="count-badge" id="feedbackCount">0</span>
        </div>
        <div class="box-body" id="feedbacksBox">
            <p class="empty">No feedbacks submitted yet.</p>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <div class="info">
        Storage used: <span id="storageSize">0 KB</span> &nbsp;|&nbsp;
        Last refreshed: <span id="lastRefresh">—</span>
    </div>
    <div class="btn-row">
        <button class="btn-back" onclick="window.location.href='index.html'">← Back to App</button>
        <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
        <button class="btn-clear" onclick="clearAll()">🗑 Clear All Data</button>
    </div>
</div>

<script>
    function loadData() {
        // Students
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        document.getElementById('studentCount').textContent = students.length;
        const sBox = document.getElementById('studentsBox');
        if (students.length === 0) {
            sBox.innerHTML = '<p class="empty">No students registered yet.</p>';
        } else {
            sBox.innerHTML = students.map(s => `
                <div class="entry">
                    <div class="field"><span class="key">Name</span><span class="val">${s.name}</span></div>
                    <div class="field"><span class="key">USN</span><span class="val">${s.usn}</span></div>
                    <div class="field"><span class="key">Email</span><span class="val">${s.email}</span></div>
                    <div class="field"><span class="key">Password</span><span class="val">${'•'.repeat(s.password.length)}</span></div>
                </div>
            `).join('');
        }

        // Current session
        const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
        const sessionBox = document.getElementById('sessionBox');
        document.getElementById('sessionCount').textContent = user ? 1 : 0;
        if (!user) {
            sessionBox.innerHTML = '<p class="empty">No active session.</p>';
        } else {
            sessionBox.innerHTML = `
                <div class="entry">
                    <div class="field"><span class="key">Name</span><span class="val">${user.name || '—'}</span></div>
                    <div class="field"><span class="key">Email</span><span class="val">${user.email || '—'}</span></div>
                    <div class="field"><span class="key">Role</span><span class="val">${user.role || '—'}</span></div>
                    <div class="field"><span class="key">USN</span><span class="val">${user.usn || '—'}</span></div>
                </div>
            `;
        }

        // Feedbacks
        const feedbacks = JSON.parse(localStorage.getItem('feedbacks') || '[]');
        document.getElementById('feedbackCount').textContent = feedbacks.length;
        const fBox = document.getElementById('feedbacksBox');
        if (feedbacks.length === 0) {
            fBox.innerHTML = '<p class="empty">No feedbacks submitted yet.</p>';
        } else {
            fBox.innerHTML = [...feedbacks].reverse().map(f => `
                <div class="entry">
                    <div class="field"><span class="key">Student</span><span class="val">${f.studentName} (${f.usn})</span></div>
                    <div class="field"><span class="key">Subject</span><span class="val">${f.subjectName}</span></div>
                    <div class="field"><span class="key">Faculty</span><span class="val">${f.facultyName}</span></div>
                    <div class="field"><span class="key">Rating</span><span class="val">${'★'.repeat(f.rating)}${'☆'.repeat(5 - f.rating)}</span></div>
                    <div class="field"><span class="key">Category</span><span class="val">${f.category}</span></div>
                    <div class="field"><span class="key">Sentiment</span><span class="val"><span class="sentiment-badge ${f.sentiment}">${f.sentiment}</span></span></div>
                    <div class="field"><span class="key">Date</span><span class="val">${new Date(f.timestamp).toLocaleString()}</span></div>
                    <div class="field"><span class="key">Feedback</span><span class="val">${f.feedback.substring(0, 80)}${f.feedback.length > 80 ? '...' : ''}</span></div>
                </div>
            `).join('');
        }

        // Storage size
        let total = 0;
        for (let key in localStorage) {
            if (localStorage.hasOwnProperty(key)) {
                total += (localStorage[key].length + key.length) * 2;
            }
        }
        document.getElementById('storageSize').textContent = (total / 1024).toFixed(2) + ' KB';
        document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString();
    }

    function clearAll() {
        if (confirm('This will delete ALL students, sessions, and feedbacks. Are you sure?')) {
            localStorage.removeItem('students');
            localStorage.removeItem('currentUser');
            localStorage.removeItem('feedbacks');
            loadData();
        }
    }

    // Auto-refresh every 3 seconds
    loadData();
    setInterval(loadData, 3000);
</script>
</body>
</html>
