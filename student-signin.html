<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign In - Feedback System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>Student Sign In</h1>
                <p>Welcome back! Please sign in to continue</p>
            </div>

            <form id="studentSignInForm" class="login-form">
                <div class="form-group">
                    <label for="studentEmail">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        Email Address
                    </label>
                    <input type="email" id="studentEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="studentPassword">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Password
                    </label>
                    <input type="password" id="studentPassword" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn">
                    <span>Sign In</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </button>

                <div class="login-footer">
                    <p>Don't have an account? <a href="student-signup.html" style="color: #9d4edd; text-decoration: none; font-weight: 600;">Sign Up</a></p>
                    <button type="button" class="back-btn" onclick="window.location.href='index.html'">← Back to Home</button>
                </div>
            </form>
        </div>

        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <script>
        document.getElementById('studentSignInForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('studentEmail').value;
            const password = document.getElementById('studentPassword').value;

            // Check if student exists in localStorage
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const student = students.find(s => s.email === email && s.password === password);

            if (student) {
                localStorage.setItem('currentUser', JSON.stringify({ 
                    name: student.name,
                    usn: student.usn,
                    email: student.email, 
                    role: 'student' 
                }));
                alert('Login Successful! Welcome ' + student.name);
                window.location.href = 'home.html';
            } else {
                alert('Invalid credentials! Please check your email and password or sign up first.');
            }
        });
    </script>
</body>
</html>
