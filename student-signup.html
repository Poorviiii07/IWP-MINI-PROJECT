<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign Up - Feedback System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>Student Sign Up</h1>
                <p>Create your account to get started</p>
            </div>

            <form id="studentSignUpForm" class="login-form">
                <div class="form-group">
                    <label for="signupName">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Full Name
                    </label>
                    <input type="text" id="signupName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="signupUSN">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                        USN (University Seat Number)
                    </label>
                    <input type="text" id="signupUSN" placeholder="e.g., 1MS21CS001" required pattern="[A-Za-z0-9]+" title="Enter valid USN">
                </div>

                <div class="form-group">
                    <label for="signupEmail">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        Email Address
                    </label>
                    <input type="email" id="signupEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="signupPassword">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Password
                    </label>
                    <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="signupConfirmPassword">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Confirm Password
                    </label>
                    <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required minlength="6">
                </div>

                <button type="submit" class="login-btn">
                    <span>Sign Up</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </button>

                <div class="login-footer">
                    <p>Already have an account? <a href="student-signin.html" style="color: #9d4edd; text-decoration: none; font-weight: 600;">Sign In</a></p>
                    <button type="button" class="back-btn" onclick="window.location.href='index.html'">← Back to Home</button>
                </div>
            </form>
        </div>

        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <script>
        document.getElementById('studentSignUpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const usn = document.getElementById('signupUSN').value.toUpperCase();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters long!');
                return;
            }

            // Save to localStorage
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            
            // Check if email already exists
            if (students.find(s => s.email === email)) {
                alert('Email already registered! Please sign in instead.');
                window.location.href = 'student-signin.html';
                return;
            }

            // Check if USN already exists
            if (students.find(s => s.usn === usn)) {
                alert('USN already registered! Please sign in instead.');
                window.location.href = 'student-signin.html';
                return;
            }

            students.push({ name, usn, email, password });
            localStorage.setItem('students', JSON.stringify(students));
            
            alert('Sign Up Successful! Please sign in now.');
            window.location.href = 'student-signin.html';
        });
    </script>
</body>
</html>
