<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Student Feedback System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <span><h2>CampusPulse</h2></span>
            </div>
            <div class="nav-right">
                <span class="welcome-text">Welcome, <strong id="studentName">Student</strong></span>
                <button class="logout-btn" onclick="window.location.href='home.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    </svg>
                    Home
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>My Profile</h1>
                <p>Manage your personal information and preferences</p>
            </div>

            <div class="profile-grid">
                <!-- Profile Card -->
                <div class="profile-card">
                    <div class="profile-avatar">
                        <div class="avatar-circle">
                            <span id="avatarInitial">S</span>
                        </div>
                        <h2 id="profileName">Student Name</h2>
                        <p id="profileEmail">student@email.com</p>
                    </div>

                    <div class="profile-stats">
                        <div class="profile-stat-item">
                            <div class="profile-stat-value" id="profileSubmissions">0</div>
                            <div class="profile-stat-label">Submissions</div>
                        </div>
                        <div class="profile-stat-item">
                            <div class="profile-stat-value" id="profileAvgRating">0.0</div>
                            <div class="profile-stat-label">Avg Rating</div>
                        </div>
                    </div>
                </div>

                <!-- Edit Profile Form -->
                <div class="profile-form-card">
                    <h3>Edit Profile Information</h3>
                    <form id="profileForm">
                        <div class="form-group">
                            <label for="editName">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                                Full Name
                            </label>
                            <input type="text" id="editName" required>
                        </div>

                        <div class="form-group">
                            <label for="editEmail">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                    <polyline points="22,6 12,13 2,6"/>
                                </svg>
                                Email Address
                            </label>
                            <input type="email" id="editEmail" disabled style="opacity: 0.6; cursor: not-allowed;">
                            <small style="color: rgba(255,255,255,0.5);">Email cannot be changed</small>
                        </div>

                        <div class="form-group">
                            <label for="currentPassword">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                Current Password
                            </label>
                            <input type="password" id="currentPassword" placeholder="Enter to change password">
                        </div>

                        <div class="form-group">
                            <label for="newPassword">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                New Password
                            </label>
                            <input type="password" id="newPassword" placeholder="Leave blank to keep current" minlength="6">
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                Confirm New Password
                            </label>
                            <input type="password" id="confirmPassword" placeholder="Confirm new password">
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-reset" onclick="window.location.href='home.html'">Cancel</button>
                            <button type="submit" class="btn-submit">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Account Actions -->
            <div class="account-actions">
                <h3>Account Actions</h3>
                <div class="action-buttons">
                    <button class="action-btn danger" onclick="deleteAccount()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        Delete Account
                    </button>
                    <button class="action-btn" onclick="logout()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentUser = {};

        window.onload = function() {
            currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            
            if (!currentUser.role || currentUser.role !== 'student') {
                alert('Please login first!');
                window.location.href = 'index.html';
                return;
            }

            loadProfile();
        };

        function loadProfile() {
            // Display current user info
            document.getElementById('studentName').textContent = currentUser.name || 'Student';
            document.getElementById('profileName').textContent = currentUser.name || 'Student';
            document.getElementById('profileEmail').textContent = currentUser.email || '';
            document.getElementById('avatarInitial').textContent = (currentUser.name || 'S').charAt(0).toUpperCase();

            // Pre-fill form
            document.getElementById('editName').value = currentUser.name || '';
            document.getElementById('editEmail').value = currentUser.email || '';

            // Load stats
            const feedbacks = JSON.parse(localStorage.getItem('feedbacks') || '[]');
            const userFeedbacks = feedbacks.filter(f => f.studentEmail === currentUser.email);
            
            document.getElementById('profileSubmissions').textContent = userFeedbacks.length;
            
            if (userFeedbacks.length > 0) {
                const avgRating = userFeedbacks.reduce((sum, f) => sum + f.rating, 0) / userFeedbacks.length;
                document.getElementById('profileAvgRating').textContent = avgRating.toFixed(1);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const newName = document.getElementById('editName').value;
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Get students array
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const studentIndex = students.findIndex(s => s.email === currentUser.email);

            if (studentIndex === -1) {
                alert('User not found!');
                return;
            }

            // If changing password
            if (newPassword) {
                if (!currentPassword) {
                    alert('Please enter your current password!');
                    return;
                }

                if (students[studentIndex].password !== currentPassword) {
                    alert('Current password is incorrect!');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    alert('New passwords do not match!');
                    return;
                }

                if (newPassword.length < 6) {
                    alert('Password must be at least 6 characters!');
                    return;
                }

                students[studentIndex].password = newPassword;
            }

            // Update name
            students[studentIndex].name = newName;
            localStorage.setItem('students', JSON.stringify(students));

            // Update current user
            currentUser.name = newName;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            alert('Profile updated successfully!');
            loadProfile();
            
            // Clear password fields
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        });

        function deleteAccount() {
            if (!confirm('Are you sure you want to delete your account? This action cannot be undone!')) {
                return;
            }

            if (!confirm('All your feedback submissions will be deleted. Are you absolutely sure?')) {
                return;
            }

            // Remove from students
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const filtered = students.filter(s => s.email !== currentUser.email);
            localStorage.setItem('students', JSON.stringify(filtered));

            // Remove feedbacks
            const feedbacks = JSON.parse(localStorage.getItem('feedbacks') || '[]');
            const filteredFeedbacks = feedbacks.filter(f => f.studentEmail !== currentUser.email);
            localStorage.setItem('feedbacks', JSON.stringify(filteredFeedbacks));

            // Logout
            localStorage.removeItem('currentUser');
            alert('Account deleted successfully!');
            window.location.href = 'index.html';
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
